<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>小钱全网综合分享</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@400;700;900&family=JetBrains+Mono:wght@400;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-deep: #0d1117;
            --bg-card: rgba(255,255,255,0.08);
            --bg-card-hover: rgba(255,255,255,0.14);
            --border: rgba(255,255,255,0.13);
            --border-hover: rgba(255,255,255,0.32);
            --text-primary: #f0f2f8;
            --text-muted: rgba(240,242,248,0.55);
            --accent-1: #e0b97a;
            --accent-2: #6dd5ed;
            --accent-3: #c084fc;
            --radius: 14px;
            --ease: cubic-bezier(0.22, 1, 0.36, 1);
        }

        *, *::before, *::after {
            margin: 0; padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
            -webkit-font-smoothing: antialiased;
        }

        body {
            min-height: 100vh;
            background: var(--bg-deep);
            color: var(--text-primary);
            font-family: 'Noto Serif SC', 'PingFang SC', serif;
            overflow-x: hidden;
            padding: 80px 16px 100px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        /* 极光画布层 */
        #aurora {
            position: fixed;
            inset: 0;
            z-index: 0;
            pointer-events: none;
        }

        .noise {
            position: fixed;
            inset: 0;
            background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.85' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.035'/%3E%3C/svg%3E");
            background-size: 180px;
            opacity: 0.5;
            pointer-events: none;
            z-index: 1;
        }

        .wrap {
            position: relative;
            z-index: 2;
            width: 100%;
            max-width: 480px;
        }
        @media(min-width:1024px){ .wrap{ max-width:1100px; } }

        /* 跑马灯优化 */
        .marquee-bar {
            position: fixed;
            top: 0; left: 0;
            width: 100%;
            background: rgba(13,17,23,0.8);
            backdrop-filter: blur(15px);
            -webkit-backdrop-filter: blur(15px);
            border-bottom: 1px solid var(--border);
            padding: 10px 0;
            overflow: hidden;
            z-index: 200;
        }
        .marquee-track {
            display: flex;
            width: fit-content;
            animation: mscroll 20s linear infinite;
        }
        .marquee-track span {
            padding: 0 40px;
            font-family: 'JetBrains Mono', monospace;
            font-size: 13px;
            color: var(--accent-1);
            white-space: nowrap;
        }
        @keyframes mscroll {
            from { transform: translateX(0); }
            to   { transform: translateX(-50%); }
        }

        /* 头部 */
        .header { text-align: center; margin-bottom: 40px; animation: fadeUp 0.8s var(--ease); }
        .page-title {
            font-size: clamp(28px, 6vw, 42px);
            font-weight: 900;
            background: linear-gradient(90deg, #e0b97a, #6dd5ed, #c084fc, #e0b97a);
            background-size: 200%;
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            animation: shimmer 5s linear infinite;
        }
        @keyframes shimmer { to { background-position: 200% center; } }

        /* 折叠面板 */
        .accordion {
            margin-bottom: 12px;
            border-radius: var(--radius);
            border: 1px solid var(--border);
            background: var(--bg-card);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            transition: all 0.3s var(--ease);
        }
        .accordion:hover { border-color: var(--border-hover); background: var(--bg-card-hover); }
        .accordion.active { border-color: var(--accent-2); box-shadow: 0 10px 30px rgba(0,0,0,0.3); }

        .accordion-header {
            padding: 18px 20px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            cursor: pointer;
        }
        .header-label { font-size: 16px; font-weight: 700; color: var(--text-primary); }
        .header-arrow { transition: transform 0.4s var(--ease); color: var(--text-muted); }
        .accordion.active .header-arrow { transform: rotate(180deg); color: var(--accent-2); }

        .accordion-body {
            display: grid;
            grid-template-rows: 0fr;
            transition: grid-template-rows 0.4s var(--ease);
        }
        .accordion.active .accordion-body { grid-template-rows: 1fr; }
        .accordion-inner { overflow: hidden; }

        .btn-grid {
            padding: 0 16px 20px;
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(140px, 1fr));
            gap: 10px;
        }

        /* 按钮 */
        .btn {
            padding: 12px;
            border-radius: 8px;
            background: rgba(255,255,255,0.05);
            border: 1px solid var(--border);
            color: var(--text-primary);
            text-decoration: none;
            font-size: 14px;
            text-align: center;
            transition: 0.2s;
            position: relative;
            overflow: hidden;
            display: block;
        }
        .btn:hover { background: rgba(255,255,255,0.12); border-color: var(--accent-2); transform: translateY(-2px); }
        .btn:active { transform: translateY(0); }

        /* 书源类按钮特殊颜色区分 (可选) */
        .btn[data-type="copy"] { border-left: 3px solid var(--accent-3); }

        .copyright {
            margin-top: 50px;
            font-size: 11px;
            color: var(--text-muted);
            text-align: center;
            line-height: 1.8;
            font-family: 'JetBrains Mono', monospace;
        }

        .toast {
            position: fixed;
            bottom: 40px;
            left: 50%;
            transform: translateX(-50%) translateY(30px);
            background: rgba(0,0,0,0.8);
            color: var(--accent-2);
            padding: 8px 20px;
            border-radius: 20px;
            font-size: 12px;
            opacity: 0;
            transition: 0.3s;
            z-index: 1000;
            border: 1px solid var(--accent-2);
        }
        .toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }

        @keyframes fadeUp {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }
    </style>
</head>
<body>

<canvas id="aurora"></canvas>
<div class="noise"></div>

<div class="marquee-bar">
    <div class="marquee-track">
        <span>将军赶路，不追小兔 • 资源整理不易，请勿商用 • 持续维护更新中 • </span>
        <span>将军赶路，不追小兔 • 资源整理不易，请勿商用 • 持续维护更新中 • </span>
    </div>
</div>

<div class="toast" id="toast">已复制到剪贴板</div>

<div class="wrap">
    <div class="header">
        <h1 class="page-title">小钱全网综合分享</h1>
    </div>

    <div class="accordion">
        <div class="accordion-header">
            <span class="header-label">小说软件仓库</span>
            <div class="header-arrow">▼</div>
        </div>
        <div class="accordion-body">
            <div class="accordion-inner">
                <div class="btn-grid">
                    <a class="btn" href="https://apps.apple.com/cn/app/id6445861996" target="_blank">亨读「苹果」</a>
                    <a class="btn" data-type="copy" data-url="https://gh-proxy.org/.../total.json">复制亨读书源</a>
                </div>
            </div>
        </div>
    </div>
    
    <div class="copyright">
        © 2026 小钱全网综合分享<br>
        本站仅供资源导航，不存储任何内容<br>
        如有侵权请联系删除
    </div>
</div>

<script>
    // 1. 极光背景逻辑优化：增加可见性检查以省电
    (function() {
        const canvas = document.getElementById('aurora');
        const ctx = canvas.getContext('2d');
        let W, H, t = 0, isVisible = true;

        const resize = () => {
            W = canvas.width = window.innerWidth;
            H = canvas.height = window.innerHeight;
        };
        window.addEventListener('resize', resize);
        resize();

        document.addEventListener('visibilitychange', () => isVisible = !document.hidden);

        const bands = [
            { color:[80,220,200], baseY:0.3, amp:0.1, freq:0.05, speed:0.01, alpha:0.15 },
            { color:[160,100,255], baseY:0.4, amp:0.08, freq:0.03, speed:0.008, alpha:0.12 }
        ];

        function frame() {
            if (isVisible) {
                t += 1;
                ctx.fillStyle = '#0d1117';
                ctx.fillRect(0, 0, W, H);
                ctx.globalCompositeOperation = 'screen';

                bands.forEach(b => {
                    ctx.beginPath();
                    for (let x = 0; x <= W; x += 5) {
                        const y = b.baseY * H + Math.sin(x * b.freq + t * b.speed) * b.amp * H;
                        x === 0 ? ctx.moveTo(x, y) : ctx.lineTo(x, y);
                    }
                    ctx.lineTo(W, H); ctx.lineTo(0, H);
                    ctx.fillStyle = `rgba(${b.color[0]},${b.color[1]},${b.color[2]},${b.alpha})`;
                    ctx.fill();
                });
            }
            requestAnimationFrame(frame);
        }
        frame();
    })();

    // 2. 交互逻辑：统一处理点击、复制和跳转
    const toast = document.getElementById('toast');
    let toastTimer;

    document.addEventListener('click', async (e) => {
        // 折叠面板切换
        const header = e.target.closest('.accordion-header');
        if (header) {
            header.parentElement.classList.toggle('active');
            return;
        }

        // 按钮处理
        const btn = e.target.closest('.btn');
        if (btn) {
            const url = btn.dataset.url || btn.getAttribute('href');
            const isCopyOnly = btn.dataset.type === 'copy';

            if (url) {
                // 执行复制
                try {
                    await navigator.clipboard.writeText(url);
                    showToast(isCopyOnly ? "链接已复制，请去 App 内导入" : "链接已复制并尝试跳转");
                } catch (err) {}

                // 如果不是纯复制，则跳转
                if (!isCopyOnly && btn.hasAttribute('href')) {
                    // 默认 href 会触发跳转，不需要额外逻辑
                } else if (!isCopyOnly && btn.dataset.url) {
                    window.open(url, '_blank');
                }
            }
        }
    });

    function showToast(msg) {
        toast.textContent = msg;
        toast.classList.add('show');
        clearTimeout(toastTimer);
        toastTimer = setTimeout(() => toast.classList.remove('show'), 2000);
    }
</script>
</body>
</html>
