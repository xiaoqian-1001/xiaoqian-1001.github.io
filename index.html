            min-height: 100vh;
            /* 替换为你图中的青绿色调渐变 */
            background: linear-gradient(135deg, #88a878 0%, #799c69 100%);
            background-attachment: fixed;
            color: #fff;
            padding: 40px 20px;
            display: flex;

        }

        /* 主容器：居中 + 毛玻璃卡片 */
        .container {
            width: 100%;

            background: rgba(255, 255, 255, 0.15);

            -webkit-backdrop-filter: blur(10px);
            border-radius: 20px;

            padding: 40px;
            box-shadow: 0 8px 32px 0 rgba(31, 38, 135, 0.2);
            text-align: center;

        h1 {

            margin-bottom: 8px;

        }

        .username {

            opacity: 0.9;
            margin-bottom: 10px;
        }

        .tagline {
            font-size: 1em;
            margin-bottom: 30px;
            opacity: 0.95;
        }

        h2 {
            font-size: 1.4em;
            margin: 30px 0 15px;
            padding-bottom: 8px;
            border-bottom: 1px solid rgba(255,255,255,0.3);
        }

        /* 按钮组样式 */
        .btn-group {
            display: flex;
            flex-direction: column;
            gap: 12px;
            margin-bottom: 10px;
        }

        .btn {
            display: block;
            padding: 14px 20px;
            background: rgba(255, 255, 255, 0.1);
            border: 1px solid rgba(255, 255, 255, 0.2);
            border-radius: 12px;
            color: #fff;
            text-decoration: none;
            transition: all 0.3s ease;
            backdrop-filter: blur(5px);
            font-size: 1em;
        }

        .btn:hover {
            background: rgba(255, 255, 255, 0.25);
            transform: translateY(-3px);
            box-shadow: 0 8px 20px rgba(0,0,0,0.15);
        }

        .btn:active {
            transform: translateY(0);
            box-shadow: none;
        }

        /* 联系方式列表 */
        .contact-list {
            list-style: none;
            padding-left: 0;
            margin-top: 10px;
        }

        .contact-list li {
            margin: 10px 0;
            opacity: 0.9;
            font-size: 1em;
        }

        /* 动态渐变背景 - 同步替换为青绿色调 */
        body::before {
            content: "";
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: linear-gradient(135deg, #88a878 0%, #799c69 100%);
            background-size: 400% 400%;
            animation: gradientBG 15s ease infinite;
            z-index: -1;
        }

        @keyframes gradientBG {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        /* 移动端适配优化 */
        @media (max-width: 600px) {
            .container {
                padding: 25px;
            }
            h1 {
                font-size: 1.8em;
            }
            .btn {
                padding: 12px 16px;
            }
        }
