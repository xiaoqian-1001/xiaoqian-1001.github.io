<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>小钱全网综合分享</title>
    <style>
        /* 全局变量统一 */
        :root {
            --glass-bg: rgba(255, 255, 255, 0.15);
            --glass-border: rgba(255, 255, 255, 0.2);
            --glass-shadow: 0 8px 32px rgba(0, 0, 0, 0.1);
            --text-primary: #333;
            --accent-color: #ff6b6b; /* 统一橙红色调 */
            --accent-hover: #ff5252;
            --menu-gradient: linear-gradient(45deg, #ff6b6b, #4ecdc4);
        }

        * { 
            margin: 0; 
            padding: 0; 
            box-sizing: border-box; 
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; 
        }

        /* 顶部菜单栏样式 */
        .marquee-container {
            position: fixed;
            top: 0; 
            left: 0; 
            width: 100%;
            background: var(--menu-gradient);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            padding: 8px 0;
            box-shadow: var(--glass-shadow);
            overflow: hidden;
            z-index: 100;
            border-radius: 0 0 12px 12px;
        }
        .marquee {
            white-space: nowrap;
            display: flex;
            animation: marquee 15s linear infinite;
        }
        .marquee span {
            color: white;
            font-weight: bold;
            text-decoration: none;
            padding: 0 15px;
            font-size: 14px;
        }

        /* 统一的下拉菜单样式 */
        .dropdown {
            position: relative;
            display: inline-block;
            margin: 10px;
        }
        .dropdown-btn {
            background: var(--menu-gradient);
            color: white;
            padding: 10px 20px;
            border: none;
            cursor: pointer;
            border-radius: 8px;
            font-weight: 600;
            transition: all 0.3s ease;
            box-shadow: var(--glass-shadow);
        }
        .dropdown-btn:hover {
            background: var(--accent-hover);
            transform: translateY(-2px);
        }
        .dropdown-content {
            display: none;
            position: absolute;
            background: var(--glass-bg);
            min-width: 200px;
            box-shadow: var(--glass-shadow);
            border-radius: 8px;
            z-index: 1;
            border: 1px solid var(--glass-border);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            overflow: hidden;
        }
        .dropdown-content a {
            color: var(--text-primary);
            padding: 12px 16px;
            text-decoration: none;
            display: block;
            border-bottom: 1px solid var(--glass-border);
            transition: all 0.2s ease;
        }
        .dropdown-content a:hover {
            background: rgba(255, 255, 255, 0.2);
            color: var(--accent-color);
        }
        .dropdown:hover .dropdown-content {
            display: block;
        }

        /* 彩虹渐变标题 */
        .page-title {
            text-align: center;
            font-size: 32px;
            font-weight: 700;
            margin: 20px 0;
            background: var(--menu-gradient);
            background-size: 400% 400%;
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            animation: gradient 8s ease infinite;
        }

        /* 响应式设计 */
        @media (max-width: 600px) {
            .dropdown-btn {
                padding: 8px 15px;
                font-size: 14px;
            }
            .dropdown-content {
                min-width: 160px;
            }
        }
    </style>
</head>
<body>
    <!-- 顶部菜单栏 -->
    <div class="marquee-container">
        <div class="marquee">
            <span>小钱全网资源分享，海量资源免费看，付费内容低价解锁</span>
        </div>
    </div>

    <div style="margin-top: 50px; text-align: center;">
        <h1 class="page-title">小钱全网综合分享</h1>
        
        <!-- 统一风格的下拉菜单 -->
        <div class="dropdown">
            <button class="dropdown-btn">影视软件仓库</button>
            <div class="dropdown-content">
                <a href="#">123TV「网页」</a>
                <a href="#">飞流视频「网页」</a>
                <a href="#">注视影视「网页」</a>
            </div>
        </div>

        <div class="dropdown">
            <button class="dropdown-btn">小说软件仓库</button>
            <div class="dropdown-content">
                <a href="#">亨读「苹果」</a>
                <a href="#">读不舍手「苹果」</a>
            </div>
        </div>
    </div>

    <script>
        // 保持与顶部菜单相同的动画效果
        document.querySelectorAll('.dropdown-btn').forEach(button => {
            button.addEventListener('click', function() {
                this.classList.toggle('active');
                const content = this.nextElementSibling;
                if (content.style.display === 'block') {
                    content.style.display = 'none';
                } else {
                    content.style.display = 'block';
                }
            });
        });
    </script>
</body>
</html>
